apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: react
  template:
    metadata:
      labels:
        app: react
    spec:
      containers:
        - name: react
          image: andresnenis/symfony-react-react:latest
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: ssl
              mountPath: /etc/nginx/ssl
              readOnly: true
      volumes:
        - name: ssl
          secret:
            secretName: andres-tls